server:
  port: 8081
spring:
  application:
    name: accounts-service
  datasource:
    url: jdbc:postgresql://localhost:5432/bank_db?currentSchema=accounts
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: update # Для разработки. В продакшене лучше Liquibase/Flyway
    properties:
      hibernate:
        default_schema: accounts

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/