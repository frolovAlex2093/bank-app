server:
  port: 8081
spring:
  application:
    name: accounts-service
  datasource:
    url: jdbc:postgresql://localhost:5432/bank_db?currentSchema=accounts
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: accounts
  flyway:
    enabled: true
    schemas: accounts
    default-schema: accounts
    create-schemas: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/bank-realm
          jwk-set-uri: http://localhost:9090/realms/bank-realm/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/