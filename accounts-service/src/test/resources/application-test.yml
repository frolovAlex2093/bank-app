spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    # Явно указываем диалект для H2, имитирующий PostgreSQL
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    properties:
      hibernate:
        # Эта настройка теперь будет работать, т.к. Hibernate корректен
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        default_schema: accounts
  flyway:
    enabled: false
  main:
    allow-bean-definition-overriding: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/jwks # Любой URL, он не будет вызван из-за мока
  cloud:
    config:
          enabled: false   # отключаем попытки обратиться к Config Server


eureka:
  client:
    enabled: false

