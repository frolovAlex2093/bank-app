apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-service-discovery-test"
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: dns-check
      image: busybox:1.36
      command:
        - /bin/sh
        - -ec
        - |
          nslookup accounts-service
          nslookup cash-service
          nslookup transfer-service
          nslookup notifications-service
          nslookup gateway-service
