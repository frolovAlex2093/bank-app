apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
spec:
  selector: { app: elasticsearch }
  ports: [{ port: 9200, targetPort: 9200 }]
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
spec:
  selector: { app: logstash }
  ports: [{ port: 50000, targetPort: 50000 }]
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
spec:
  type: NodePort
  selector: { app: kibana }
  ports: [{ port: 5601, targetPort: 5601, nodePort: 30561 }]