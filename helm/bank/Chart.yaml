apiVersion: v2
name: bank
description: Umbrella Helm chart for Bank microservices
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgres
    version: 0.1.0
    repository: "file://charts/postgres"
  - name: keycloak
    version: 0.1.0
    repository: "file://charts/keycloak"
    condition: keycloak.enabled
  - name: kafka
    version: 0.1.0
    repository: "file://charts/kafka"
  - name: accounts-service
    version: 0.1.0
    repository: "file://charts/accounts-service"
  - name: cash-service
    version: 0.1.0
    repository: "file://charts/cash-service"
  - name: transfer-service
    version: 0.1.0
    repository: "file://charts/transfer-service"
  - name: notifications-service
    version: 0.1.0
    repository: "file://charts/notifications-service"
  - name: gateway-service
    version: 0.1.0
    repository: "file://charts/gateway-service"
  - name: bank-front-ui
    version: 0.1.0
    repository: "file://charts/bank-front-ui"
    condition: bank-front-ui.enabled
  - name: zipkin
    version: 0.1.0
    repository: "file://charts/zipkin"
  - name: prometheus
    version: 0.1.0
    repository: "file://charts/prometheus"
  - name: grafana
    version: 0.1.0
    repository: "file://charts/grafana"
  - name: elk
    version: 0.1.0
    repository: "file://charts/elk"
