server:
  port: 8082

spring:
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
  application:
    name: cash-service
  security:
    oauth2:
      client:
        registration:
          cash-service-client:
            client-id: cash-service
            client-secret: ${CASH_CLIENT_SECRET:secret}
            authorization-grant-type: client_credentials
            scope: internal_api
        provider:
          keycloak:
            issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:9090/realms/bank-realm}
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:9090/realms/bank-realm}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://localhost:9090/realms/bank-realm/protocol/openid-connect/certs}
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0 # 100% трейсов (только для dev)
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411}/api/v2/spans

logstash:
  url: ${LOGSTASH_URL:logstash:50000}

logging:
  level:
    ru.yandex.practicum: DEBUG