server:
  port: 8083

spring:
  application:
    name: transfer-service
  security:
    oauth2:
      client:
        registration:
          transfer-service-client:
            client-id: transfer-service
            client-secret: ${TRANSFER_CLIENT_SECRET:secret}
            authorization-grant-type: client_credentials
            scope: internal_api
        provider:
          keycloak:
            issuer-uri: http://localhost:9090/realms/bank-realm
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/bank-realm
          jwk-set-uri: http://localhost:9090/realms/bank-realm/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/