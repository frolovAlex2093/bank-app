server:
  port: 8085

spring:
  application:
    name: bank-front-ui
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: bank-front-client
            client-secret: ${KEYCLOAK_CLIENT_SECRET:secret}
            scope: openid, profile, read, write
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
        provider:
          keycloak:
            issuer-uri: http://localhost:9090/realms/bank-realm

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/