spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: bank-front-client
            client-secret: test-secret
            scope: openid, profile
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
        provider:
          keycloak:
            authorization-uri: http://localhost:9090/realms/bank-realm/protocol/openid-connect/auth
            token-uri: http://localhost:9090/realms/bank-realm/protocol/openid-connect/token
            jwk-set-uri: http://localhost:9090/realms/bank-realm/protocol/openid-connect/certs
            user-name-attribute: preferred_username
  cloud:
    config:
      enabled: false
eureka:
  client:
    enabled: false